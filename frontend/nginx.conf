server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect all routes to index.html so React Router works correctly
    # Without this, a hard refresh on /users would return 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for ALB target group health checks
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Enable gzip compression for faster page loads
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
}
